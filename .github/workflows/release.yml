name: Release

on:
  push:
    branches: [main]

# Cancel in-flight releases when a new push lands so we don't race
# the "Version Packages" PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write       # commit Version PR + push tags
      pull-requests: write  # open / update the Version PR
      id-token: write       # npm provenance attestations (SLSA-3)

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build

      - name: Create release PR or publish
        id: changesets
        uses: changesets/action@v1
        with:
          # When there are unconsumed changesets → open a "Version Packages" PR.
          # When that PR is merged (no remaining changesets) → run `release`,
          # which builds + `changeset publish` (npm publish per package).
          version: pnpm version-packages
          publish: pnpm release
          createGithubReleases: true
          title: 'chore: version packages'
          commit: 'chore: version packages'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
          # Enable npm provenance attestations on every publish
          NPM_CONFIG_PROVENANCE: 'true'
